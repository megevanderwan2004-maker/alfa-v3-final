<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | ALFA Car Audio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Auth check is now handled inside admin.js using Supabase -->

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">
                    <img src="PHOTO-2026-02-20-13-37-44.jpg" alt="ALFA Audio Logo" class="logo-img"
                        style="max-height: 40px;">
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-link-tab active" data-target="products-panel"><i class="fa-solid fa-box"></i> Productos</a>
                <a href="#" class="nav-link-tab" data-target="promotions-panel"><i class="fa-solid fa-star"></i> Promoción del Mes</a>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-logout" class="btn-sidebar"><i class="fa-solid fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="topbar">
                <h1 id="admin-title">Gestión de Catálogo</h1>
                <div class="topbar-actions">
                    <button class="btn-gold" id="btn-add-product"><i class="fa-solid fa-plus"></i> Nuevo Producto</button>
                    <button class="btn-gold" id="btn-export-catalog" style="margin-left: 10px; background: #fff; color: #000;"><i class="fa-solid fa-save"></i> SAUVEGARDER LES MODIFICATIONS</button>
                </div>
            </header>

            <!-- Products Management Panel -->
            <div id="products-panel" class="content-panel tab-content active">
                <div class="admin-search-bar" style="margin-bottom: 20px;">
                    <input type="text" id="admin-search" placeholder="🔍 Buscar por nombre, SKU o categoría..." class="input-dark" style="max-width: 400px; padding-left: 15px; background: #000;">
                </div>

                <!-- NEW: Universe Tabs -->
                <div class="universe-tabs" id="universe-tabs">
                    <button class="tab-btn active" data-universe="all">TODOS</button>
                    <button class="tab-btn" data-universe="iluminacion">ILUMINACIÓN</button>
                    <button class="tab-btn" data-universe="audio">AUDIO</button>
                    <button class="tab-btn" data-universe="seguridad">SEGURIDAD</button>
                    <button class="tab-btn" data-universe="otros">OTROS</button>
                </div>

                <!-- NEW: Dynamic Catalog Container -->
                <div id="catalog-container" class="catalog-container">
                    <!-- Sections injected via JS -->
                </div>
            </div>

            <!-- Promotions Management Panel -->
            <div id="promotions-panel" class="content-panel tab-content" style="display:none;">
                <p style="margin-bottom: 30px; color: var(--text-secondary);">Selecciona los 3 productos que se mostrarán en la sección "PROMOCIÓN DEL MES" de la página de inicio.</p>
                <div class="promotions-grid" id="promotions-slots" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                    <!-- 3 Slots injected via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Agregar Producto</h3>
            <form id="product-form">
                <input type="hidden" id="prod-id">

                <div class="form-group">
                    <label>Nombre del Producto *</label>
                    <input type="text" id="prod-name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>SKU</label>
                        <input type="text" id="prod-sku">
                    </div>
                    <div class="form-group">
                        <label>Precio ($) *</label>
                        <input type="number" id="prod-price" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Categoría *</label>
                    <input type="text" id="prod-category" placeholder="Ej. amplificadores, subwoofers..." required>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="prod-desc" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="prod-image">URL de Imagen (o nombre en Supabase)</label>
                    <input type="text" id="prod-image" placeholder="https://..." readonly>
                </div>

                <!-- NEW: Upload Area -->
                <div class="upload-container" id="upload-area">
                    <div class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Arrastra una imagen aquí o <span>haz clic para subir</span></p>
                        <input type="file" id="file-input" hidden accept="image/*">
                    </div>
                </div>

                <!-- NEW: Google Drive Bridge -->
                <div class="input-group" style="margin-top:15px;">
                    <label>Importar desde Google Drive / Link</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="drive-link" placeholder="Pega el link de la imagen aquí...">
                        <button type="button" id="btn-import-drive" class="btn-gold" style="padding:5px 15px;">IMPORTAR</button>
                    </div>
                </div>
                <div id="img-preview" class="img-preview" style="margin-top:10px;"></div>

                <button type="submit" class="btn-save">Guardar Cambios</button>
            </form>
        </div>
    </div>

    </div>

    <!-- Product Selection Modal (for Promotions) -->
    <div id="product-select-modal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-select-modal" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);">&times;</span>
            <h3 style="margin-bottom: 20px; color: var(--gold-primary);">Seleccionar Producto</h3>
            <div class="admin-search-bar" style="margin-bottom: 20px;">
                <input type="text" id="select-search" placeholder="🔍 Buscar producto..." class="input-dark" style="width: 100%; background: #000;">
            </div>
            <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>SKU</th>
                            <th>Nombre</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="select-table-body">
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Load data -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module" src="admin.js"></script>
</body>

</html>
